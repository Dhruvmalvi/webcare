<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | WebCare</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 3rem 2rem;
            text-align: center;
        }

        .login-logo {
            font-size: 2rem;
            margin-bottom: 2rem;
            display: inline-block;
        }

        .login-form {
            text-align: left;
        }

        .login-form .form-group {
            margin-bottom: 1.5rem;
        }

        .error-message {
            color: #ef4444;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
            text-align: center;
        }

        .back-link {
            display: block;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body class="dark-theme">
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <div class="login-container">
        <div class="glass-card login-card">
            <a href="index.html" class="logo login-logo">Web<span class="text-gradient">Care</span></a>
            <h2 style="margin-bottom: 0.5rem;">Welcome Back</h2>
            <p class="text-muted" style="margin-bottom: 2rem;">Sign in to access the admin dashboard.</p>
            
            <div id="login-error" class="error-message">Invalid username or password.</div>

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="username" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Username</label>
                    <input type="text" id="username" class="form-input" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="password" class="form-input" required autocomplete="current-password" style="padding-right: 2.5rem; width: 100%; box-sizing: border-box;">
                        <i class="fa-solid fa-eye" id="togglePassword" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted);"></i>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-full">Sign In</button>
            </form>

            <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Website</a>
        </div>
    </div>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });
    </script>
    <script src="login.js"></script>
</body>
</html>
